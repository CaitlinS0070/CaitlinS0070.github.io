<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PA_Mining_Map_CS.html</title>

  <style>
    body {
  margin: 0;
  padding: 0;
}

h2,
h3 {
  margin: 10px;
  font-size: 18px;
}

h3 {
  font-size: 16px;
}

p {
  margin: 10px;
}

#map {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
}

.map-overlay {
  position: absolute;
  background: #fff;
  font-family: Arial, sans-serif;
  border-radius: 3px;
  overflow: auto;
}

#features {
  top: 0;
  right: 0;
  height: 120px;
  width: 260px;
  margin: 20px;
}

#legend {
  bottom: 0;
  right: 0;
  padding: 10px;
  margin: 20px;
  width: 220px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  line-height: 18px;
}

.legend-key {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin-right: 6px;
  border-radius: 50%;
}
  </style>

  
</head>
<body>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />

<div id="map"></div>

<div class="map-overlay" id="features">
  <h2>Pennsylvania Underground Mines</h2>
  <div id="pd"><p>Zoom into points to view the names for each of the mines!</p></div>
</div>
<div class="map-overlay" id="legend"></div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiY2FpdGxpbi1zIiwiYSI6ImNtbm52Z29hZDIwbWcyb3BwdTVpazM0d2cifQ.MSnGH3zg3tLk2lOqlbLSvw';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/caitlin-s/cmns61ip3008101sc39flgcc5'
});

map.on('load', () => {

  // Fit map to Pennsylvania
  const paBounds = [
    [-80.52, 39.72],
    [-74.69, 42.27]
  ];

  map.fitBounds(paBounds, { padding: 20 });

  const layers = [
    'underground-mines-PA-marker',
    'underground-mines-PA-circles'
  ];

  // Interactions
  layers.forEach(layer => {

    // CLICK → popup
    map.on('click', layer, (e) => {
      const feature = e.features[0];

      new mapboxgl.Popup({ offset: [0, -15] })
        .setLngLat(feature.geometry.coordinates)
        .setHTML(`
          <h3>${feature.properties.SITE_NAME || 'Unnamed Mine'}</h3>
        `)
        .addTo(map);
    });

    // Hover cursor
    map.on('mouseenter', layer, () => {
      map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', layer, () => {
      map.getCanvas().style.cursor = '';
    });

  });

  // LEGEND (single item)
  const legend = document.getElementById('legend');

  const item = document.createElement('div');

  item.innerHTML = `
    <span class="legend-key" style="background:#895b1f"></span>
    Underground Mine
  `;

  legend.appendChild(item);

});
  </script>
</body>
</html>
